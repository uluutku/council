name: Bug report
description: Report a reproducible defect
title: '[Bug]: '
labels: ['bug']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Steps, the route or screen involved, and any console or network errors. Do not paste credentials or tokens.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, browser and version, and Node version.
    validations:
      required: true
