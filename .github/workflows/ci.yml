name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  format-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Format
        run: npm run format:check
      - name: Lint
        run: npm run lint

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Shared and frontend tests
        run: npm run test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Production build
        run: npm run build

  database:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Start Supabase
        run: npm run supabase:start
      - name: Reset database
        run: npm run supabase:reset
      - name: Schema lint
        run: node scripts/supabase.mjs db lint
      - name: Database and RLS tests
        run: npm run db:test
      - name: Capture service state on failure
        if: failure()
        run: docker ps --format 'table {{.Names}}\t{{.Status}}' > database-services.txt
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: database-failure-state
          path: database-services.txt
      - if: always()
        run: npm run supabase:stop

  concurrency:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run supabase:start
      - run: npm run supabase:reset
      - name: Messaging concurrency
        run: set -o pipefail; npm run test:concurrency 2>&1 | tee concurrency.log
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: concurrency-log
          path: concurrency.log
      - if: always()
        run: npm run supabase:stop

  ai-edge:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run supabase:start
      - run: npm run supabase:reset
      - name: AI Edge integration
        run: set -o pipefail; npm run test:ai-edge 2>&1 | tee ai-edge.log
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ai-edge-log
          path: ai-edge.log
      - if: always()
        run: npm run supabase:stop

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run supabase:start
      - run: npm run supabase:reset
      - run: npx playwright install --with-deps chromium
      - name: Playwright E2E
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-failure-artifacts
          path: |
            apps/web/test-results
            apps/web/playwright-report
          if-no-files-found: ignore
      - if: always()
        run: npm run supabase:stop
