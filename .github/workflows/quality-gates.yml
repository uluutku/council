name: Quality gates

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-and-ai:
    name: Web, schemas, and AI contracts
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format, lint, tests, and web build
        run: npm run check

      - name: AI Edge static check
        run: npm run deno:check:ai

      - name: Offline AI evaluations
        run: npm run eval:ai:offline

  mobile:
    name: Flutter mobile
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v3
        with:
          channel: stable
          cache: true

      - name: Resolve mobile dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Mobile format check
        working-directory: apps/mobile
        run: dart format --output=none --set-exit-if-changed .

      - name: Mobile static analysis
        working-directory: apps/mobile
        run: flutter analyze

      - name: Mobile unit and widget tests
        working-directory: apps/mobile
        run: flutter test

      - name: Android debug build
        working-directory: apps/mobile
        run: flutter build apk --debug --dart-define-from-file=config/local.example.json
