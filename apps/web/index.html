<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Council combines private human messaging and persistent AI contacts."
    />
    <title>Council</title>
    <script>
      (() => {
        const theme = localStorage.getItem('council.theme');
        document.documentElement.dataset.theme = ['light', 'dark', 'system'].includes(theme)
          ? theme
          : 'system';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
